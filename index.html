<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body>
   <div class="h-[clamp(5rem,4.2593rem+3.9506vw,9rem)] flex flex-col justify-center items-center bg-slate-950 text-white">
  <nav class="xl:w-[80dvw] container max-md:px-3 flex items-center justify-between relative"x-data="{ 
    isOpen: false,
    navItems: [
      { name: 'Home', link: '/' },
      { name: 'Profil', link: '/profil' },
      { name: 'Layanan', link: '/layanan' },
      { name: 'Arsip', link: '/arsip' },
      { name: 'Perpustakaan', link: '/perpustakaan' },
      { name: 'Kontak', link: '/kontak' }
    ]
  }">
    
    <a href="" class="group flex items-center gap-5 px-1 py-2 transition-all duration-300 z-10">
      <img 
        src="https://upload.wikimedia.org/wikipedia/commons/e/e6/New_Coat_of_Arms_of_Gowa.png" 
        alt="Logo Kabupaten Gowa" 
        class="w-[clamp(2.75rem,2.421rem+1.6447vw,4.5rem)] h-auto transition-transform duration-300 group-hover:scale-105"
      />
      <span class="font-semibold text-[clamp(.7rem,1rem+1.3vw,1rem)] leading-4 xl:leading-5 text-balance w-[20ch]">
        Dinas Kearsipan Dan Perpustakaan Kabupaten Gowa 
      </span>
    </a>

    <button 
      type="button" 
      @click="isOpen = !isOpen"
      class="block xl:hidden group relative h-12 w-12 flex items-center justify-center transition-all active:scale-90 z-[60]"
      :aria-expanded="isOpen"
      aria-label="Toggle Menu">
      
      <div class="flex h-[20px] w-6 flex-col justify-between items-end">
        <span class="h-0.5 w-full rounded-full transition-all duration-300"
              :class="isOpen ? 'rotate-45 translate-y-2.5 bg-red-500' : 'bg-green-500'"></span>
        
        <span class="h-0.5 w-full rounded-full transition-all duration-300"
              :class="isOpen ? 'opacity-0' : 'bg-green-500 group-hover:w-3/4'"></span>
        
        <span class="h-0.5 w-full rounded-full transition-all duration-300"
              :class="isOpen ? '-rotate-45 -translate-y-2.5 bg-red-500' : 'bg-green-500 group-hover:w-1/2'"></span>
      </div>
    </button>

    <div 
      x-show="isOpen" 
      x-transition:enter="transition opacity-out duration-300"
      x-transition:enter-start="opacity-0"
      x-transition:enter-end="opacity-100"
      x-transition:leave="transition opacity-in duration-200"
      @click="isOpen = false"
      class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[40]"
      style="display: none;">
    </div>

    <div 
    x-show="isOpen"
    @keydown.escape.window="isOpen = false"
    x-transition:enter="transition transform ease-out duration-300"
    x-transition:enter-start="translate-x-full"
    x-transition:enter-end="translate-x-0"
    x-transition:leave="transition transform ease-in duration-200"
    x-transition:leave-start="translate-x-0"
    x-transition:leave-end="translate-x-full"
    class="fixed top-0 right-0 h-full w-[70dvw] max-w-[300px] bg-slate-900 border-l border-slate-800 shadow-2xl z-[50] p-6 pt-24"
    style="display: none;">
    
    <nav class="flex flex-col space-y-2">
      <template x-for="item in navItems" :key="item.name">
        <a :href="item.link" 
           class="group flex items-center justify-between text-lg text-slate-300 hover:text-green-500 hover:bg-slate-800/50 px-4 py-3 rounded-xl transition-all duration-200 border-b border-slate-800/50 last:border-0"
           @click="isOpen = false">
          
          <span x-text="item.name"></span>
          
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 opacity-0 -translate-x-2 transition-all group-hover:opacity-100 group-hover:translate-x-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="9 5l7 7-7 7" />
          </svg>
        </a>
      </template>
    </nav>

    <div class="mt-10 pt-6 border-t border-slate-800">
        <p class="text-xs text-slate-500 text-center">© 2024 Dinas Kearsipan & Perpustakaan Gowa</p>
    </div>
  </div>
  
  <nav class="hidden xl:block flex items-center">
  <ul class="flex items-center space-x-1">
    <template x-for="item in navItems" :key="item.name">
      <li>
        <a :href="item.link" 
           x-text="item.name"
           class="px-4 py-2 rounded-lg text-sm font-medium text-slate-300 transition-all duration-200 hover:bg-slate-800 hover:text-green-500 focus:outline-none focus:ring-2 focus:ring-green-500/50"
           :class="{ 'text-green-500 bg-slate-800/40': window.location.pathname === item.link }">
        </a>
      </li>
    </template>
  </ul>
</nav>
  </nav>
</div>
  </body>
</html>
